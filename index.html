<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>連絡ボード</title>

<!-- LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root{
    --main: #ff8a65;
    --main-dark: #e6633a;
    --bg: #fff7f0;
    --card: #ffffff;
    --text: #4a3f35;
    --sub: #a89b8c;
    --off: #e0dcd6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px 16px 60px;
  }
  .header{
    text-align:center;
    margin-bottom: 14px;
  }
  .header h1{
    font-size: 20px;
    margin: 4px 0;
  }
  .header .date{
    color: var(--sub);
    font-size: 14px;
  }

  /* 曜日タブ */
  .tabs{
    display:flex;
    gap: 6px;
    margin-bottom: 18px;
  }
  .tab{
    flex: 1;
    text-align:center;
    padding: 10px 0 8px;
    border-radius: 12px;
    background: #fff;
    border: 2px solid var(--off);
    color: var(--sub);
    font-size: 13px;
    line-height: 1.3;
  }
  .tab .day-name{
    font-weight: 700;
    font-size: 14px;
  }
  .tab .day-date{
    font-size: 11px;
    margin-top: 2px;
  }
  .tab.today{
    border-color: var(--main);
  }
  .tab.active{
    background: var(--main);
    border-color: var(--main);
    color: #fff;
  }

  .card{
    background: var(--card);
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .card-label{
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .toggle-row{
    display:flex;
    gap:10px;
  }
  .toggle-btn{
    flex:1;
    padding: 14px 0;
    border-radius: 12px;
    border: 2px solid var(--off);
    background: #fff;
    color: var(--sub);
    font-size: 15px;
    font-weight: 600;
    text-align:center;
    transition: all 0.15s;
  }
  .toggle-btn.active{
    border-color: var(--main);
    background: var(--main);
    color: #fff;
  }

  /* 時刻入力：はみ出し対策 */
  .time-input-wrap{
    width: 100%;
    max-width: 100%;
    overflow: hidden;
    border-radius: 12px;
    border: 2px solid var(--off);
    background: #fff;
  }
  .time-input-wrap:focus-within{
    border-color: var(--main);
  }
  .time-input{
    display:block;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    padding: 12px 10px;
    border: none;
    background: transparent;
    font-size: 16px;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
  }
  .time-input:focus{
    outline:none;
  }

  .last-update{
    text-align:center;
    color: var(--sub);
    font-size: 12px;
    margin-top: 18px;
  }
  .status{
    text-align:center;
    padding: 40px 0;
    color: var(--sub);
  }
</style>
</head>
<body>

<div class="header">
  <h1>連絡ボード</h1>
  <div class="date" id="dateLabel">--</div>
</div>

<div id="app" style="display:none;">

  <div class="tabs" id="tabs"></div>

  <div class="card">
    <div class="card-label">🍱 お弁当</div>
    <div class="toggle-row">
      <div class="toggle-btn" data-field="bento" data-value="need">必要</div>
      <div class="toggle-btn" data-field="bento" data-value="noneed">不要</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">🍚 夕飯</div>
    <div class="toggle-row">
      <div class="toggle-btn" data-field="dinner" data-value="need">必要</div>
      <div class="toggle-btn" data-field="dinner" data-value="noneed">不要</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">🏠 帰宅時間</div>
    <div class="time-input-wrap">
      <input type="time" class="time-input" id="returnTime" step="600">
    </div>
  </div>

  <div class="card">
    <div class="card-label">🚗 翌日の出発時間</div>
    <div class="time-input-wrap">
      <input type="time" class="time-input" id="departTime" step="600">
    </div>
  </div>

  <div class="last-update" id="lastUpdate"></div>
</div>

<div class="status" id="statusMsg">読み込み中...</div>

<script>
/* ============ 設定エリア ============ */
const LIFF_ID = "2010707286-obtMAVFH";

const firebaseConfig = {
  apiKey: "AIzaSyDHjpD3vC_bl_vEoymo1ga90Fg2dj3PdGc",
  authDomain: "family-todo-tomorrow.firebaseapp.com",
  databaseURL: "https://family-todo-tomorrow-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "family-todo-tomorrow",
  storageBucket: "family-todo-tomorrow.firebasestorage.app",
  messagingSenderId: "705055892377",
  appId: "1:705055892377:web:ff306a6c7f154bf4b4e908"
};
/* ==================================== */

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let userName = "誰か";
let currentBoardRef = null;
let selectedDateKey = null;

function fmtKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function fmtLabel(d){
  const week = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日（${week}）`;
}

// 今週の月〜金の日付を作る
function getWeekDates(){
  const today = new Date();
  const dow = today.getDay(); // 0=日
  const diffToMonday = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMonday);

  const days = [];
  const names = ['月','火','水','木','金'];
  for(let i=0;i<5;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push({
      dateKey: fmtKey(d),
      name: names[i],
      shortDate: `${d.getMonth()+1}/${d.getDate()}`,
      fullLabel: fmtLabel(d),
      isToday: fmtKey(d) === fmtKey(today)
    });
  }
  return days;
}

const weekDays = getWeekDates();

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  weekDays.forEach(day=>{
    const el = document.createElement('div');
    el.className = 'tab' + (day.isToday ? ' today' : '') + (day.dateKey === selectedDateKey ? ' active' : '');
    el.innerHTML = `<div class="day-name">${day.name}</div><div class="day-date">${day.shortDate}</div>`;
    el.addEventListener('click', ()=> selectDay(day.dateKey));
    tabsEl.appendChild(el);
  });
}

function setActive(field, value){
  document.querySelectorAll(`.toggle-btn[data-field="${field}"]`).forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.value === value);
  });
}

function resetBoardUI(){
  setActive('bento', null);
  setActive('dinner', null);
  document.getElementById('returnTime').value = '';
  document.getElementById('departTime').value = '';
  document.getElementById('lastUpdate').textContent = '';
}

function selectDay(dateKey){
  selectedDateKey = dateKey;
  renderTabs();
  resetBoardUI();

  const dayInfo = weekDays.find(d=>d.dateKey===dateKey);
  document.getElementById('dateLabel').textContent = dayInfo ? dayInfo.fullLabel : dateKey;

  if(currentBoardRef){
    currentBoardRef.off();
  }
  currentBoardRef = db.ref(`dailyBoard/${dateKey}`);
  currentBoardRef.on('value', (snapshot)=>{
    const data = snapshot.val() || {};
    if(data.bento) setActive('bento', data.bento);
    if(data.dinner) setActive('dinner', data.dinner);
    if(data.returnTime) document.getElementById('returnTime').value = data.returnTime;
    if(data.departTime) document.getElementById('departTime').value = data.departTime;
    if(data.updatedBy && data.updatedAt){
      const t = new Date(data.updatedAt);
      const hh = String(t.getHours()).padStart(2,'0');
      const mm = String(t.getMinutes()).padStart(2,'0');
      document.getElementById('lastUpdate').textContent = `最終更新：${data.updatedBy} ${hh}:${mm}`;
    }
  });
}

function updateField(field, value){
  if(!currentBoardRef) return;
  currentBoardRef.update({
    [field]: value,
    updatedBy: userName,
    updatedAt: Date.now()
  });
}

document.querySelectorAll('.toggle-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const field = btn.dataset.field;
    const value = btn.dataset.value;
    setActive(field, value);
    updateField(field, value);
  });
});

document.getElementById('returnTime').addEventListener('change', (e)=>{
  updateField('returnTime', e.target.value);
});
document.getElementById('departTime').addEventListener('change', (e)=>{
  updateField('departTime', e.target.value);
});

function showApp(){
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderTabs();
  const todayEntry = weekDays.find(d=>d.isToday) || weekDays[0];
  selectDay(todayEntry.dateKey);
}

if(LIFF_ID !== "YOUR_LIFF_ID_HERE"){
  liff.init({ liffId: LIFF_ID }).then(()=>{
    if(liff.isLoggedIn()){
      liff.getProfile().then(profile=>{
        userName = profile.displayName;
        showApp();
      });
    } else {
      showApp();
    }
  }).catch(err=>{
    console.error('LIFF init error', err);
    showApp();
  });
} else {
  showApp();
}
</script>

</body>
</html>
